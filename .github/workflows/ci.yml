name: CI

on:
  push:
    branches: [main, streamlit-deploy]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install numpy scipy pytest

      - name: Run tests
        run: |
          pytest streamlit_app/tests/test_ab.py -v
